services:
  statuspage:
    image: ghcr.io/mrvibecodic/xray-checker-statuspage:latest
    container_name: statuspage
    restart: unless-stopped
    environment:
      # URL подписки (vless://...). Сервер сам тянет её, парсит и отдаёт
      # пробникам — на устройствах юзеров подписка не светится.
      # Изменения подхватываются автоматически через PROBE_TARGETS_TTL_MIN.
      - PROBE_SUBSCRIPTION_URL=https://example.com/sub
      # User-Agent для запроса подписки: панели смотрят на него и отдают
      # разный формат. v2rayN/6.40 — самый универсальный, понимается всеми.
      - PROBE_SUBSCRIPTION_USER_AGENT=v2rayN/6.40
      # Сколько хранить кеш разобранных таргетов (минуты). По истечении —
      # следующий запрос пробника или /api/summary тянет подписку заново.
      - PROBE_TARGETS_TTL_MIN=10
      # Sync подписки в `current` (имена/флаги для UI). Тот же кеш, что и
      # PROBE_TARGETS_TTL_MIN, поэтому короткий интервал ничего не стоит.
      - POLL_INTERVAL=60
      - DAYS=30
      - TZ=Europe/Moscow
      - TITLE=Статус серверов
      - SUBTITLE=Доступность серверов в реальном времени
      - DB_PATH=/data/status.db
      # Раскомментируйте и задайте секрет, чтобы появилась возможность
      # вручную удалять старые записи (дубли) со страницы статуса —
      # кнопка-замок в шапке, × напротив каждой строки, регистрация
      # пробников.
      # - ADMIN_TOKEN=CHANGE_ME
    volumes:
      - ./data:/data
    ports:
      - "127.0.0.1:8080:8080"
